/* ================== 根据金币计算SAME值 ================== */
function getSameByMoney(money) {
  if (money < 0) return 1;
  if (money < 1000) {
    // 从1线性下降到0.9
    return 1 - (money / 1000) * 0.1;
  }
  if (money < 3000) {
    // 从0.9线性下降到0.8
    return 0.9 - ((money - 1000) / 2000) * 0.1;
  }
  if (money < 10000) {
    // 从0.8线性下降到0.7
    return 0.8 - ((money - 3000) / 7000) * 0.1;
  }
  return 0.7;
}

/* ================== 稀有度排序 ================== */
const LEVEL_RANK = {
  "SSS": 12,
  "SS": 11,
  "S": 10,
  "A": 9,
  "B": 8,
  "C": 7,
  "D": 6,
  "E": 5,
  "F": 4,
  "FF": 3,
  "FFF": 2
};

function getBestPrize(p1, p2){
  if(!p1) return p2;
  if(!p2) return p1;
  return LEVEL_RANK[p1.level] >= LEVEL_RANK[p2.level] ? p1 : p2;
}

function getWorstPrize(p1, p2){
  if(!p1) return p2;
  if(!p2) return p1;
  return LEVEL_RANK[p1.level] <= LEVEL_RANK[p2.level] ? p1 : p2;
}

/* ================== 构建 Reel ================== */
function buildReel(targetPrize, stopIndex){
  const strip = document.createElement("div");
  strip.className = "strip";  
  
  const totalWeight = PRIZES.reduce((sum, p) => sum + p.weight, 0);
  
  for(let i=0;i<60;i++){
    let p;
    
    if(i === stopIndex){
      p = targetPrize;
    } else {
      let random = Math.random() * totalWeight;
      for(const prize of PRIZES){
        random -= prize.weight;
        if(random <= 0){
          p = prize;
          break;
        }
      }
      if(!p) p = PRIZES[PRIZES.length - 1];
    }
    
    const cell = document.createElement("div");
    cell.className = "cell";
    const img = document.createElement("img");
    img.src = `/images/${p.id}.jpg`;
    img.onerror = ()=>{img.remove();cell.textContent=p.id};
    cell.appendChild(img);
    strip.appendChild(cell);
  }
  return strip;
}

/* ================== 权重选择 ================== */
function pick(except=null, forceLevel=null){
  let pool = except ? PRIZES.filter(p=>p!==except) : [...PRIZES];
  
  if(forceLevel){
    pool = pool.filter(p=>p.level===forceLevel);
  }

  const totalWeight = pool.reduce((sum, p) => sum + p.weight, 0);
  let random = Math.random() * totalWeight;
  for(const p of pool){
    random -= p.weight;
    if(random <= 0) return p;
  }
  return pool[pool.length - 1];
}

/* ================== 保底权重修正 ================== */
function applyGuaranteeWeights(){
  if(counterA >= 9){
    const lowPrizes = PRIZES.filter(p => ["B","C","D","E","F","FF","FFF"].includes(p.level));
    const lowTotalWeight = lowPrizes.reduce((sum, p) => sum + p.weight, 0);
    
    const aPrizes = PRIZES.filter(p => p.level === "A");
    const aTotalWeight = aPrizes.reduce((sum, p) => sum + p.weight, 0);
    
    aPrizes.forEach(a => {
      a.weight += lowTotalWeight * (a.weight / aTotalWeight);
    });
  }
  
  if(counterS >= 99){
    const lowPrizes = PRIZES.filter(p => ["B","C","D","E","F","FF","FFF"].includes(p.level));
    const lowTotalWeight = lowPrizes.reduce((sum, p) => sum + p.weight, 0);
    
    const sPrizes = PRIZES.filter(p => ["S","SS","SSS"].includes(p.level));
    const sTotalWeight = sPrizes.reduce((sum, p) => sum + p.weight, 0);
    
    sPrizes.forEach(s => {
      s.weight += lowTotalWeight * (s.weight / sTotalWeight);
    });
  }
}

/* ================== 播放单个奖品音效（只播放等级音效） ================== */
function playPrizeAudioWithFallback(mainPrize, fallbackPrize){
  const tryMainAudio = () => {
    return new Promise((resolve) => {
      const audio = new Audio(`/sounds/${mainPrize.level}.wav`);
      
      let played = false;
      
      audio.play().then(() => {
        played = true;
        resolve(true);
      }).catch(() => {
        resolve(false);
      });
      
      setTimeout(() => {
        if(!played) resolve(false);
      }, 3000);
    });
  };
  
  const tryFallbackAudio = () => {
    if(!fallbackPrize) return Promise.resolve(false);
    
    return new Promise((resolve) => {
      const audio = new Audio(`/sounds/${fallbackPrize.level}.wav`);
      
      let played = false;
      
      audio.play().then(() => {
        played = true;
        resolve(true);
      }).catch(() => {
        resolve(false);
      });
      
      setTimeout(() => {
        if(!played) resolve(false);
      }, 3000);
    });
  };
  
  tryMainAudio().then(success => {
    if(!success) {
      tryFallbackAudio();
    }
  });
}

/* ================== 播放多个奖品 ID 音效（不重复） ================== */
function playPrizeIdAudios(prizeIds){
  if(!prizeIds.length) return;

  let index = 0;

  function playNext(){
    if(index >= prizeIds.length) return;

    const audio = new Audio(`/sounds/${prizeIds[index]}.wav`);
    index++;

    audio.play().then(() => {
      audio.onended = () => setTimeout(playNext, 1);
      setTimeout(() => {
        if(index < prizeIds.length) playNext();
      }, 200);
    }).catch(() => {
      setTimeout(playNext, 1);
    });
  }

  playNext();
}

  bgm.volume = 0.3;
  bgm.play().then(()=>{
    bgmStarted = true;
  }).catch(()=>{});
}

function update(){
  document.getElementById("money").textContent = money;
  localStorage.setItem("money",money);
}

function showWinAlert(prize){
  const alert = document.getElementById("win-alert");
  alert.textContent = prize.level;
  let color = "#fff";
  switch(prize.level){
    case "C": color="#44ff44"; break;
    case "B": color="#4444ff"; break;
    case "A": color="#aa44ff"; break;
    case "S": color="#ffcc00"; break;
    case "SS": color="#ffcc00"; break;
    case "SSS": color="#ffcc00"; break;
  }
  alert.style.color = color;
  alert.classList.add("show");
  setTimeout(()=>alert.classList.remove("show"), 1500);
}

/* ================== 动画 ================== */
function animate(strip, targetY, duration, callback){
  const startTime = Date.now();
  const startY = 0;  
  function step(){
    const progress = Math.min((Date.now() - startTime) / duration, 1);
    strip.style.transform = `translateY(${startY + (targetY - startY) * progress}px)`;
    if(progress < 1) requestAnimationFrame(step);
    else callback && callback();
  }
  step();
}

/* ================== 视频系统 ================== */
async function checkVideoExists(videoPath) {
  try {
    const response = await fetch(videoPath, { method: 'HEAD' });
    return response.ok;
  } catch {
    return false;
  }
}

async function playVideo(prize) {
  const videoPath = `/videos/${prize.id}.mp4`;
  const videoExists = await checkVideoExists(videoPath);
  
  if (!videoExists) {
    return false;
  }

  const bgm = document.getElementById("bgm");
  bgm.pause();

  const whiteFlash = document.getElementById("white-flash");
  whiteFlash.style.opacity = '1';
  
  await new Promise(resolve => setTimeout(resolve, 300));
  
  whiteFlash.style.opacity = '0';
  
  const overlay = document.getElementById("video-overlay");
  const video = document.getElementById("video-player");
  
  overlay.style.display = 'flex';
  video.style.display = 'block';
  video.src = videoPath;
  video.muted = false;
  
  try {
    await video.play();
  } catch (error) {
    bgm.play();
    overlay.style.display = 'none';
    video.style.display = 'none';
    return false;
  }
  
  const closeVideo = () => {
    video.pause();
    overlay.style.display = 'none';
    video.style.display = 'none';
    video.src = '';
    bgm.play();
    document.removeEventListener('click', closeVideo);
    video.removeEventListener('ended', closeVideo);
  };
  
  video.addEventListener('ended', closeVideo);
  document.addEventListener('click', closeVideo);
  
  return true;
}

/* ================== 单次抽奖逻辑 ================== */
function doSingleSpin(currentMoney, forceLevel){
  const originalWeights = PRIZES.map(p=>({id:p.id, weight:p.weight}));  
  let currentSame = getSameByMoney(currentMoney);
  
  if(forceLevel){
    applyGuaranteeWeights();
    currentSame = 1;
  }

  const r1 = pick(null, forceLevel);
  const r2 = Math.random()<currentSame ? r1 : pick(r1, forceLevel);
  const r3 = Math.random()<currentSame ? r2 : pick(r2, forceLevel);

  const isWin = r1.id === r2.id && r2.id === r3.id;

  if(isWin && isAorAbove(r1)){
    counterA = 0;
  } else {
    counterA++;
  }

  if(isWin && isSorAbove(r1)){
    counterS = 0;
  } else {
    counterS++;
  }

  originalWeights.forEach(o=>{
    const p = PRIZES.find(p=>p.id===o.id);
    if(p) p.weight = o.weight;
  });

  return {
    r1, r2, r3,
    isWin,
    winPrize: isWin ? r1 : null,
    gold: isWin ? r1.gold : 0
  };
}

/* ================== 10连抽结果展示 ================== */
function show10Result(results, bestPrize){
  const overlay = document.getElementById("result-overlay");
  const grid = document.getElementById("result-grid");
  grid.innerHTML = "";
  
  const cells = [];
  results.forEach((r, index) => {
    const cell = document.createElement("div");
    cell.className = "result-cell";
    
    if(r.isWin){
      const img = document.createElement("img");
      img.className = "prize-img";
      img.src = `/images/${r.winPrize.id}.jpg`;
      img.onerror = ()=>{img.remove();cell.textContent=r.winPrize.id};
      cell.appendChild(img);
      
      const levelSpan = document.createElement("span");
      levelSpan.className = `level-text level-${r.winPrize.level}`;
      levelSpan.textContent = r.winPrize.level;
      cell.appendChild(levelSpan);
      
      if(["S","SS","SSS"].includes(r.winPrize.level)){
        cell.classList.add("glow-gold");
      } else if(r.winPrize.level === "A"){
        cell.classList.add("glow-purple");
      }
    } else {
      const d = document.createElement("span");
      d.className = "level-text";
      d.style.color = "#fff";
      d.textContent = "D";
      d.style.display = "block";
      cell.appendChild(d);
    }
    
    grid.appendChild(cell);
    cells.push({cell, result: r});
  });
  
  overlay.style.display = "flex";
  
  let showLevel = false;
  cells.forEach(({cell, result}) => {
    if(!result.isWin) return;
    const img = cell.querySelector("img");
    const levelText = cell.querySelector(".level-text");
    img.style.display = "flex";
    levelText.style.display = "none";
  });
  
  const interval = setInterval(() => {
    showLevel = !showLevel;
    cells.forEach(({cell, result}) => {
      if(!result.isWin) return;
      const img = cell.querySelector("img");
      const levelText = cell.querySelector(".level-text");
      if(showLevel){
        img.style.display = "none";
        levelText.style.display = "block";
      } else {
        img.style.display = "flex";
        levelText.style.display = "none";
      }
    });
  }, 1333);
  
  window._10resultInterval = interval;
}

function hide10Result(){
  const overlay = document.getElementById("result-overlay");
  overlay.style.display = "none";
  if(window._10resultInterval){
    clearInterval(window._10resultInterval);
    window._10resultInterval = null;
  }
}
