<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>对对胡MANIA</title>
<style>
:root {
    --tile-w: 40px;  /* 调整为适合图片的宽度 */
    --tile-h: 60px;  /* 调整为适合图片的高度 */
    --gap: 2px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: "Microsoft YaHei", sans-serif; 
    background: #0a2e18; 
    color: #f0e6d3; 
    display: flex; 
    justify-content: center; 
    padding-top: 5px;
    min-height: 100vh;
    font-size: 11px;
}
.container { display: flex; gap: 8px; }

/* 左侧区域 */
.left-panel { width: 280px; }  /* 稍微加宽以适应图片 */
.info-bar { 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 4px;
    font-size: 10px;
}
.hand-area {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
    background: #053014;
    padding: 5px;
    border-radius: 3px;
    margin-bottom: 5px;
}
.slot { 
    height: calc(var(--tile-h) * 1.1); 
    background: rgba(0,0,0,0.2); 
    border-radius: 2px; 
    cursor: pointer; 
    transition: all 0.2s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}
.slot.selected { box-shadow: 0 0 5px gold; transform: translateY(-2px); }
.slot.empty { background: rgba(0,0,0,0.4); cursor: default; }
.slot .tile-wrapper { display: flex; }
.slot .tile { 
    width: var(--tile-w); 
    height: var(--tile-h); 
    border: 1px solid #333; 
    border-radius: 2px; 
    background: #fff; 
    color: #000; 
    font-size: 13px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    margin-left: -8px; /* 图片重叠效果 */
    overflow: hidden; /* 确保图片不溢出 */
}
.slot .tile:first-child { margin-left: 0; }
.slot .tile img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 图片适应容器 */
}

.controls { display: flex; gap: 3px; }
.controls button { 
    flex: 1;
    padding: 4px 2px; 
    font-size: 10px; 
    border: none; 
    border-radius: 2px; 
    cursor: pointer; 
    background: #b8860b; 
    color: #000; 
    font-weight: bold;
}
.controls button:disabled { background: #333; color: #666; cursor: not-allowed; }

/* 右侧区域 */
.right-panel { 
    width: 150px; 
    background: #053014; 
    padding: 5px; 
    border-radius: 3px; 
    font-size: 10px; 
}
.fan-list { margin-top: 5px; max-height: 180px; overflow-y: auto; }
.fan-item { 
    display: flex; 
    justify-content: space-between; 
    padding: 2px 0; 
    border-bottom: 1px dashed #0a5c1a;
}
.fan-item.highlight { color: gold; font-weight: bold; }
.score-display { 
    margin-top: 6px; 
    font-size: 12px; 
    text-align: center; 
    padding: 3px;
    background: rgba(0,0,0,0.2);
    border-radius: 2px;
}

/* 动画界面 */
.animation-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.animation-content {
    text-align: center;
}
.animation-tiles {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 600px;
    margin-bottom: 15px;
}
.animation-tile {
    width: 50px; /* 动画里的牌可以稍微大一点 */
    height: 75px;
    border: 2px solid #fff;
    border-radius: 3px;
    background: #fff;
    color: #000;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 2px;
    overflow: hidden;
}
.animation-tile img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
.animation-tile.joker {
    border-color: gold;
    background: linear-gradient(45deg, #fff, #ffe);
}
.animation-text {
    font-size: 40px;
    font-weight: bold;
    text-shadow: 0 0 15px currentColor;
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
@keyframes multiplierFloat {
    0% {
        opacity: 0;
        transform: translateX(-50%) translateY(0) scale(0.8);
    }
    20% {
        opacity: 1;
        transform: translateX(-50%) translateY(-10px) scale(1.2);
    }
    80% {
        opacity: 1;
        transform: translateX(-50%) translateY(-30px) scale(1);
    }
    100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-50px) scale(0.8);
    }
}

/* 成绩图界面 */
.result-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.result-content {
    text-align: center;
    max-width: 500px;
}
.result-title {
    font-size: 36px;
    color: gold;
    margin-bottom: 20px;
    text-shadow: 0 0 10px gold;
}
.result-score {
    font-size: 48px;
    color: #fff;
    margin-bottom: 30px;
}
.best-rounds {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 30px;
}
.best-round-item {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
    padding: 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
}
.best-round-tiles {
    display: flex;
    margin-right: 15px;
}
.best-round-tile {
    width: 35px;
    height: 52px;
    border: 1px solid #fff;
    border-radius: 2px;
    background: #fff;
    color: #000;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 1px;
    overflow: hidden;
}
.best-round-tile img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
.best-round-tile.joker {
    border-color: gold;
    background: linear-gradient(45deg, #fff, #ffe);
}
.best-round-fan {
    font-size: 18px;
    color: gold;
    font-weight: bold;
}
.restart-btn {
    padding: 12px 30px;
    font-size: 18px;
    background: #c9a24d;
    color: #000;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}
.restart-btn:hover {
    background: #d4b366;
}
</style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="info-bar">
            <span>第 <span id="round">1</span>/10 轮</span>
            <span>门风:<span id="menFeng">东</span> 圈风:<span id="quanFeng">东</span></span>
            <span>总分: <span id="score">0</span></span>
        </div>
        <div class="hand-area" id="hand"></div>
        <div class="controls">
            <button id="smartBtn" onclick="smartSelect()">智能选牌</button>
            <button id="confirmBtn" onclick="confirmSelection()" disabled>确认(0/4)</button>
            <button id="playBtn" onclick="playRound()" disabled>打出</button>
        </div>
    </div>

    <div class="right-panel">
        <div>番型列表</div>
        <div class="fan-list" id="fanPreview">
            <p>选择4张牌...</p>
        </div>
        <div class="score-display">
            本轮得分: <span id="previewScore">0</span> 番
        </div>
    </div>
</div>
<div class="right-panel">
    <div>番型列表</div>
    <div class="fan-list" id="fanPreview">...</div>
    <div class="score-display">...</div>
    
    <!-- ✅ 新增：已选技能显示 -->
    <div style="margin-top:10px; padding:5px; background:#053014; border-radius:3px;">
        <div style="font-size:10px; color:gold;">已选技能:</div>
        <div id="chosenSkillsList" style="font-size:9px; color:#f0e6d3;"></div>
    </div>
</div>

<!-- 动画界面 -->
<div class="animation-overlay" id="animationOverlay">
    <div class="animation-content">
        <div class="animation-tiles" id="animationTiles"></div>
        <div class="animation-text" id="animationText"></div>
    </div>
</div>

<!-- 成绩图界面 -->
<div class="result-overlay" id="resultOverlay">
    <div class="result-content">
        <div class="result-title">游戏结束</div>
        <div class="result-score" id="finalScore">0 分</div>
        <div class="best-rounds">
            <h3 style="color: gold; margin-bottom: 15px;">最佳出牌</h3>
            <div id="bestRoundsList"></div>
        </div>
        <button class="restart-btn" onclick="restartGame()">重开</button>
    </div>
</div>

<script>
// ======================================================
// 配置区 - 牌库定义（已注入图片路径）
// ======================================================

// 牌库定义（34种，每种1张）
const TILES = [
    // 万子
    {id: 'm1', name: '1万', type: '万', value: 1, img: 'images/mahjong/m1.png'},
    {id: 'm2', name: '2万', type: '万', value: 2, img: 'images/mahjong/m2.png'},
    {id: 'm3', name: '3万', type: '万', value: 3, img: 'images/mahjong/m3.png'},
    {id: 'm4', name: '4万', type: '万', value: 4, img: 'images/mahjong/m4.png'},
    {id: 'm5', name: '5万', type: '万', value: 5, img: 'images/mahjong/m5.png'},
    {id: 'm6', name: '6万', type: '万', value: 6, img: 'images/mahjong/m6.png'},
    {id: 'm7', name: '7万', type: '万', value: 7, img: 'images/mahjong/m7.png'},
    {id: 'm8', name: '8万', type: '万', value: 8, img: 'images/mahjong/m8.png'},
    {id: 'm9', name: '9万', type: '万', value: 9, img: 'images/mahjong/m9.png'},
    // 条子
    {id: 's1', name: '1条', type: '条', value: 1, img: 'images/mahjong/s1.png'},
    {id: 's2', name: '2条', type: '条', value: 2, img: 'images/mahjong/s2.png'},
    {id: 's3', name: '3条', type: '条', value: 3, img: 'images/mahjong/s3.png'},
    {id: 's4', name: '4条', type: '条', value: 4, img: 'images/mahjong/s4.png'},
    {id: 's5', name: '5条', type: '条', value: 5, img: 'images/mahjong/s5.png'},
    {id: 's6', name: '6条', type: '条', value: 6, img: 'images/mahjong/s6.png'},
    {id: 's7', name: '7条', type: '条', value: 7, img: 'images/mahjong/s7.png'},
    {id: 's8', name: '8条', type: '条', value: 8, img: 'images/mahjong/s8.png'},
    {id: 's9', name: '9条', type: '条', value: 9, img: 'images/mahjong/s9.png'},
    // 筒子
    {id: 'p1', name: '1筒', type: '筒', value: 1, img: 'images/mahjong/p1.png'},
    {id: 'p2', name: '2筒', type: '筒', value: 2, img: 'images/mahjong/p2.png'},
    {id: 'p3', name: '3筒', type: '筒', value: 3, img: 'images/mahjong/p3.png'},
    {id: 'p4', name: '4筒', type: '筒', value: 4, img: 'images/mahjong/p4.png'},
    {id: 'p5', name: '5筒', type: '筒', value: 5, img: 'images/mahjong/p5.png'},
    {id: 'p6', name: '6筒', type: '筒', value: 6, img: 'images/mahjong/p6.png'},
    {id: 'p7', name: '7筒', type: '筒', value: 7, img: 'images/mahjong/p7.png'},
    {id: 'p8', name: '8筒', type: '筒', value: 8, img: 'images/mahjong/p8.png'},
    {id: 'p9', name: '9筒', type: '筒', value: 9, img: 'images/mahjong/p9.png'},
    // 字牌
    {id: 'z1', name: '东', type: '风', value: 11, img: 'images/mahjong/z1.png'},
    {id: 'z2', name: '南', type: '风', value: 12, img: 'images/mahjong/z2.png'},
    {id: 'z3', name: '西', type: '风', value: 13, img: 'images/mahjong/z3.png'},
    {id: 'z4', name: '北', type: '风', value: 14, img: 'images/mahjong/z4.png'},
    {id: 'z5', name: '中', type: '箭', value: 15, img: 'images/mahjong/z5.png'},
    {id: 'z6', name: '发', type: '箭', value: 16, img: 'images/mahjong/z6.png'},
    {id: 'z7', name: '白', type: '箭', value: 17, img: 'images/mahjong/z7.png'}
];

// 游戏状态
let deck = [];
let hand = [];
let selectedIndices = [];
let round = 1;
let totalScore = 0;
let roundHistory = [];

// 新增：门风和圈风
let menFeng = '东';
let quanFeng = '东';

const FAN_RULES = [
    // ===== 原有番型 =====
    {
        name: "混质胡",
        check: (selectedTiles) => {
            const honors = selectedTiles.filter(t => t.type === '风' || t.type === '箭');
            if (honors.length < 1 || honors.length > 3) return false;
            const numbers = selectedTiles.filter(t => t.type !== '风' && t.type !== '箭');
            const values = numbers.map(t => t.value);
            return values.every(v => [2,3,5,7].includes(v));
        },
        fan: 2,
        hasAnimation: false
    },
    {
        name: "混合胡",
        check: (selectedTiles) => {
            const honors = selectedTiles.filter(t => t.type === '风' || t.type === '箭');
            if (honors.length < 1 || honors.length > 3) return false;
            const numbers = selectedTiles.filter(t => t.type !== '风' && t.type !== '箭');
            const values = numbers.map(t => t.value);
            return values.every(v => [4,6,8,9].includes(v));
        },
        fan: 2,
        hasAnimation: false
    },
    {
        name: "哈基米南北绿豆",
        check: (selectedTiles) => {
            // 必须正好4张（防意外）
            if (selectedTiles.length !== 4) return false;

            const south  = selectedTiles.filter(t => t.type === '风' && t.name === '南');
            const north  = selectedTiles.filter(t => t.type === '风' && t.name === '北');
            const yiTiao = selectedTiles.filter(t => t.type === '条' && t.value === 1); // 1条
            const tongs  = selectedTiles.filter(t => t.type === '筒');

            // 各一张，且筒点数属于 1,2,3,4,5,6,7,9（不许8筒）
            if (
                south.length !== 1 ||
                north.length !== 1 ||
                yiTiao.length !== 1 ||
                tongs.length !== 1
            ) return false;

            const v = tongs[0].value;
            if (![2,3,4,5,6,7,9].includes(v)) return false;

            // 兜底：确保没混进其它不该有的牌（南/北/一条/筒 之外不能再有第5类）
            const total = south.concat(north).concat(yiTiao).concat(tongs);
            return total.length === 4;
        },
        fan: 48,
        hasAnimation: true,
        textColor: "#ADFF2F",   // 黄绿(GreenYellow)
        glowColor: "#6B8E23",   // 深黄绿
        bgColor: "#1A2E10"      // 暗底绿
    },
    {
        name: "大四喜",
        check: (selectedTiles) => {
            const winds = selectedTiles.filter(t => t.type === '风');
            return winds.length === 4 && new Set(winds.map(t => t.name)).size === 4;
        },
        fan: 88,
        hasAnimation: true,
        textColor: "#ff4444",
        glowColor: "#ff0000",
        bgColor: "#330000"
    },
    {
        name: "大三元",
        check: (selectedTiles) => {
            const arrows = selectedTiles.filter(t => t.type === '箭');
            return arrows.length === 3 && new Set(arrows.map(t => t.name)).size === 3;
        },
        fan: 64,
        hasAnimation: true,
        textColor: "#aa44ff",
        glowColor: "#6600ff",
        bgColor: "#110033"
    },
    {
        name: "红孔雀",
        check: (selectedTiles) => {
            const allowed = ['1条','5条','7条','9条','中'];
            return selectedTiles.every(t => allowed.includes(t.name));
        },
        fan: 48,
        hasAnimation: true,
        textColor: "#ff8888",
        glowColor: "#ff4444",
        bgColor: "#331111"
    },
    {
        name: "绿帽子",
        check: (selectedTiles) => {
            // 允许的牌列表
            const allowed = ['8条','6筒','7筒','9筒','发'];
            return selectedTiles.every(t => allowed.includes(t.name));
        },
        fan: 48,
        hasAnimation: true,
        textColor: "#00FF00",  // 绿色
        glowColor: "#00AA00",
        bgColor: "#002200"
    },
    {
        name: "黑头履",
        check: (selectedTiles) => {
            // 允许的牌列表
            const allowed = ['1筒','3筒','4筒','5筒','东'];
            return selectedTiles.every(t => allowed.includes(t.name));
        },
        fan: 48,
        hasAnimation: true,
        textColor: "#8B0000",  // 暗红色
        glowColor: "#FF0000",
        bgColor: "#1A0000"
    },
    {
        name: "四连刻",
        check: (selectedTiles) => {
            const numberTiles = selectedTiles.filter(t => t.type === '万' || t.type === '条' || t.type === '筒');
            if (numberTiles.length < 4) return false;
            const types = numberTiles.map(t => t.type);
            if (!types.every(t => t === types[0])) return false;
            const values = numberTiles.map(t => t.value).sort((a,b)=>a-b);
            for (let i=0; i<=values.length-4; i++) {
                if (values[i+3]-values[i]===3) return true;
            }
            return false;
        },
        fan: 40,
        hasAnimation: true,
        textColor: "#8B4513",
        glowColor: "#654321",
        bgColor: "#221100"
    },
    {
        name: "清幺九",
        check: (selectedTiles) => {
            const honors = selectedTiles.filter(t => t.type === '风' || t.type === '箭');
            if (honors.length > 0) return false;
            return selectedTiles.every(t => t.value === 1 || t.value === 9);
        },
        fan: 48,
        hasAnimation: true,
        textColor: "#90EE90",
        glowColor: "#32CD32",
        bgColor: "#003300"
    },
    {
        name: "小四喜",
        check: (selectedTiles) => {
            const winds = selectedTiles.filter(t => t.type === '风');
            return winds.length === 3 && new Set(winds.map(t => t.name)).size === 3;
        },
        fan: 32,
        hasAnimation: true,
        textColor: "#ff4444",
        glowColor: "#ff0000",
        bgColor: "#330000"
    },
    {
        name: "百万石",
        check: (selectedTiles) => {
            const types = selectedTiles.map(t => t.type);
            if (!types.every(t => t === '万')) return false;
            const sum = selectedTiles.reduce((s, t) => s + t.value, 0);
            return sum >= 28;
        },
        fan: 32,
        hasAnimation: true,
        textColor: "#ffffff",
        glowColor: "#cccccc",
        bgColor: "#222222"
    },
    {
        name: "十万石",
        check: (selectedTiles) => {
            const types = selectedTiles.map(t => t.type);
            if (!types.every(t => t === '万')) return false;
            const sum = selectedTiles.reduce((s, t) => s + t.value, 0);
            return sum <= 12;
        },
        fan: 32,
        hasAnimation: true,
        textColor: "#ffffff",
        glowColor: "#cccccc",
        bgColor: "#222222"
    },
    {
        name: "绿一色",
        check: (selectedTiles) => {
            const allowed = ['2条','3条','4条','6条','8条','发'];
            return selectedTiles.every(t => allowed.includes(t.name));
        },
        fan: 32,
        hasAnimation: true,
        textColor: "#00ff00",
        glowColor: "#00aa00",
        bgColor: "#002200"
    },
    {
        name: "纯正九五至尊",
        check: (selectedTiles) => {
            const honors = selectedTiles.filter(t => t.type === '风' || t.type === '箭');
            if (honors.length > 0) return false;
            const values = selectedTiles.map(t => t.value);
            return values.every(v => v === 5 || v === 9);
        },
        fan: 32,
        hasAnimation: true,
        textColor: "#FFD700",
        glowColor: "#FFA500",
        bgColor: "#332200"
    },
    {
        name: "字一色",
        check: (selectedTiles) => {
            return selectedTiles.every(t => t.type === '风' || t.type === '箭');
        },
        fan: 24,
        hasAnimation: true,
        textColor: "#00008B",
        glowColor: "#0000FF",
        bgColor: "#000011"
    },
    {
        name: "黑一色",
        check: (selectedTiles) => {
            const allowed = ['4筒','8筒','东','南','西','北'];
            return selectedTiles.every(t => allowed.includes(t.name));
        },
        fan: 32,
        hasAnimation: true,
        textColor: "#000000",
        glowColor: "#333333",
        bgColor: "#111111"
    },
    {
        name: "中原一点红",
        check: (selectedTiles) => {
            const allowed = ['1筒','3筒','5筒','6筒','7筒','9筒','中'];
            return selectedTiles.every(t => allowed.includes(t.name));
        },
        fan: 24,
        hasAnimation: true,
        textColor: "#FF4500",
        glowColor: "#FF0000",
        bgColor: "#330000"
    },
    {
        name: "纯正十全十美",
        check: (selectedTiles) => {

        TILES.forEach((tile, idx) => {
            if (skillId === 's1' && tile.type === '万') weights[idx] += 200; // 万子偏爱
            if (skillId === 's2' && tile.type === '筒') weights[idx] += 200; // 筒子之友
            if (skillId === 's3' && tile.type === '条') weights[idx] += 200; // 条子专家
            if (skillId === 's4' && (tile.value === 1 || tile.value === 9 || tile.type === '风' || tile.type === '箭')) weights[idx] += 100; // 幺九守护
            if (skillId === 's5' && (tile.type === '风' || tile.type === '箭')) weights[idx] += 200; // 字牌收集
            if (skillId === 's6' && !(tile.value >= 2 && tile.value <= 8)) weights[idx] -= 75; // 中间力量
        });
    });
}



function weightedDrawFromDeck(count) {
    const drawn = [];
    for (let i = 0; i < count; i++) {
        if (deck.length === 0) break;
        
        // 计算当前deck中每张牌的权重
        const deckWeights = deck.map(tile => {
            const tileIdx = TILES.findIndex(t => t.id === tile.id);
            return weights[tileIdx];
        });
        
        // 加权随机
        const totalWeight = deckWeights.reduce((a, b) => a + b, 0);
        let r = Math.random() * totalWeight;
        let selectedIdx = -1;
        
        for (let j = 0; j < deck.length; j++) {
            r -= deckWeights[j];
            if (r <= 0) {
                selectedIdx = j;
                break;
            }
        }
        
        if (selectedIdx === -1) selectedIdx = deck.length - 1;
        drawn.push(deck[selectedIdx]);
        deck.splice(selectedIdx, 1); // 移除已抽的牌
    }
    return drawn;
}
function dealFirstRound() {
    resetDeck(); // 重置牌堆和权重
    adjustWeights(); // 调整权重（第一轮技能为空，权重都是100）
    
    if (deck.length < 8) {
        resetDeck();
        adjustWeights();
    }
    
    const newCards = weightedDrawFromDeck(8); // 使用加权抽取
    hand = newCards.map(card => card);
    
    selectedIndices = [];
    
    renderHand();
    updateButtons();
    clearPreview();
}
function dealNextRound() {
    const emptySlots = hand.filter(card => card === null).length;
    
    // 如果牌不够，重置牌堆
    if (deck.length < emptySlots) {
        resetDeck();
        adjustWeights();
        
        // 移除手上保留的4张牌
        const keptTiles = hand.filter(tile => tile !== null);
        deck = deck.filter(tile => 
            !keptTiles.some(kept => kept.id === tile.id)
        );
    }
    
    adjustWeights(); // 调整权重
    
    // 使用加权抽取
    const newCards = weightedDrawFromDeck(emptySlots);
    
    // 放到手牌里
    let cardIndex = 0;
    for (let i = 0; i < hand.length; i++) {
        if (hand[i] === null) {
            hand[i] = newCards[cardIndex++];
        }
    }
    
    selectedIndices = [];
    renderHand();
    updateButtons();
    clearPreview();
}


// 后续轮次发4张牌填补空位
// 渲染手牌
function renderHand() {
    const area = document.getElementById('hand');
    area.innerHTML = '';
    
    hand.forEach((tile, index) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        
        if (tile === null) {
            slot.className += ' empty';
            slot.innerHTML = '<div class="tile-wrapper"><div class="tile" style="opacity:0.3;"><img src="images/mahjong/back.png" alt="背面"></div></div>';
        } else {
            slot.onclick = () => toggleSelect(index);
            
            let tilesHtml = '<div class="tile-wrapper">';
            // 显示3张牌叠在一起的效果
            for (let i = 0; i < 3; i++) {
                tilesHtml += `<div class="tile"><img src="${tile.img}" alt="${tile.name}"></div>`;
            }
            tilesHtml += '</div>';
            slot.innerHTML = tilesHtml;
        }
        
        area.appendChild(slot);
    });
    
    updateSelectionVisual();
}

// 切换选择
function toggleSelect(index) {
    const tile = hand[index];
    if (tile === null) return;
    
    const selectedIndex = selectedIndices.indexOf(index);
    
    if (selectedIndex !== -1) {
        selectedIndices.splice(selectedIndex, 1);
    } else {
        if (selectedIndices.length < 4) {
            selectedIndices.push(index);
        }
    }
    
    updateSelectionVisual();
    updateButtons();
    calculateAllFans();
}
function smartSelect() {
    // 获取非空手牌
    const validCards = hand
        .map((tile, index) => ({ tile, index }))
        .filter(item => item.tile !== null);
    
    if (validCards.length < 4) return;
    
    let bestCombo = [];
    let bestScore = -1;
    
    // 遍历所有4张牌组合 C(8,4)=70
    for (let i = 0; i < validCards.length; i++) {
        for (let j = i + 1; j < validCards.length; j++) {
            for (let k = j + 1; k < validCards.length; k++) {
                for (let l = k + 1; l < validCards.length; l++) {
                    const combo = [validCards[i], validCards[j], validCards[k], validCards[l]];
                    const indices = combo.map(item => item.index);
                    
                    // 临时设置选中
                    const originalSelected = selectedIndices;
                    selectedIndices = indices;
                    
                    // 计算番数
                    const score = calculateAllFans();
                    
                    // 恢复
                    selectedIndices = originalSelected;
                    
                    // 比较（现在是平方得分）
                    if (score > bestScore) {
                        bestScore = score;
                        bestCombo = indices;
                    }
                }
            }
        }
    }
    
    // 应用最佳组合
    selectedIndices = bestCombo;
    updateSelectionVisual();
    updateButtons();
    calculateAllFans();
}

// 更新选择视觉效果
function updateSelectionVisual() {
    document.querySelectorAll('.slot').forEach((slot, index) => {
        slot.classList.toggle('selected', selectedIndices.includes(index));
    });
}

// 更新按钮状态
function updateButtons() {
    const count = selectedIndices.length;
    document.getElementById('confirmBtn').innerText = `确认(${count}/4)`;
    document.getElementById('confirmBtn').disabled = count !== 4;
    document.getElementById('playBtn').disabled = count !== 4;
}

// 计算所有番型并返回总番数
function calculateAllFans() {
    if (selectedIndices.length !== 4) return 0;
    
    const selectedTiles = selectedIndices.map(i => hand[i]);
    
    let allFans = [];
    let totalFan = 0;
    let maxFan = 0;
    let bestRule = null;
    
    FAN_RULES.forEach(rule => {
        const realHand = hand.filter(t => t !== null);
        const result = rule.check(selectedTiles, realHand);
        if (result) {
            let fanValue = rule.fan;
            // 轮刻特殊处理
            if (rule.name === "轮刻") {
                const numbers = selectedTiles.filter(t => t.type !== '风' && t.type !== '箭');
                const count = numbers.filter(t => t.value === round).length;
                fanValue = count * round;
            }
            
            allFans.push({
                name: rule.name,
                fan: fanValue,
                rule: rule
            });
            totalFan += fanValue;
            
            if (fanValue > maxFan) {
                maxFan = fanValue;
                bestRule = rule;
            }
        }
    });
    
    if (allFans.length === 0) {
        const baseRule = FAN_RULES.find(r => r.name === "碰碰胡");
        allFans.push({
            name: baseRule.name,
            fan: baseRule.fan,
            rule: baseRule
        });
        totalFan = baseRule.fan;
        maxFan = baseRule.fan;
        bestRule = baseRule;
    }
    
    window.currentBestRule = bestRule;
    window.currentSelectedTiles = selectedTiles;
    
    renderAllFans(allFans, totalFan);
    return totalFan;
}

// 渲染所有番型
function renderAllFans(allFans, totalFan) {
    const container = document.getElementById('fanPreview');
    
    allFans.sort((a, b) => b.fan - a.fan);
    
    container.innerHTML = allFans.map(item => `
        <div class="fan-item">
            <span>${item.name}</span>
            <span>${item.fan}番</span>
        </div>
    `).join('');
    
    document.getElementById('previewScore').innerText = totalFan;
}

// 清除预览
function clearPreview() {
    document.getElementById('fanPreview').innerHTML = '<p>选择4张牌...</p>';
    document.getElementById('previewScore').innerText = '0';
}

// 确认选择
function confirmSelection() {
    if (selectedIndices.length === 4) {
        document.getElementById('playBtn').disabled = false;
    }
}

// 打出牌
function playRound() {
    if (selectedIndices.length !== 4) return;
    
    const selectedTiles = selectedIndices.map(i => hand[i]);
    lastRemainingTiles = hand.filter((tile, index) => !selectedIndices.includes(index));
    
    let allFans = [];
    let totalFan = 0;
    let maxFan = 0;
    let bestRule = null;
    
    FAN_RULES.forEach(rule => {
        const realHand = hand.filter(t => t !== null);
        const result = rule.check(selectedTiles, realHand);
    
        if (result) {
            let fanValue = rule.fan;
            if (rule.name === "轮刻") {
                const numbers = selectedTiles.filter(t => t.type !== '风' && t.type !== '箭');
                const count = numbers.filter(t => t.value === round).length;
                fanValue = count * round;
            }
            allFans.push(fanValue);
            totalFan += fanValue;
            if (fanValue > maxFan) {
                maxFan = fanValue;
                bestRule = rule;
            }
        }
    });
    
    if (totalFan === 0) {
        const baseRule = FAN_RULES.find(r => r.name === "碰碰胡");
        totalFan = baseRule.fan;
        maxFan = baseRule.fan;
        bestRule = baseRule;
    }
    
    roundHistory.push({
        round: round,
        tiles: selectedTiles.map(t => t.name),
        fan: totalFan,
        ruleName: bestRule.name
    });
    // 获取当前技能倍率
    let currentMultiplier = 1.0;
    if (chosenSkills.includes('s7') && totalFan > 50) {
        currentMultiplier *= 1.3;
    }
    // 技能8：得分倍增
    if (chosenSkills.includes('s8')) {
        currentMultiplier *= 1.2;
    }
    // 技能9：幸运暴击
    if (chosenSkills.includes('s9')) {
        currentMultiplier *= Math.random() < 0.5 ? 1.1 : 1.3;
    }
    // 技能10：终极暴击
    if (chosenSkills.includes('s10')) {
        currentMultiplier *= Math.random() < 0.5 ? 0.8 : 1.5;
    }
    // 技能11：天堂and地狱
    if (chosenSkills.includes('s11')) {
        currentMultiplier *= Math.random() < 0.5 ? 0.2 : 2.0;
    }
    // 技能13：延长赛（第11轮得分×1.5）
    if (round === 11 && chosenSkills.includes('s13')) {
        currentMultiplier *= 1.5;
    }
    // 技能14：顶胡升级（番数>75时，得分×1.4）
    if (chosenSkills.includes('s14') && totalFan > 75) {
        currentMultiplier *= 1.4;
    }
    // 技能15：超顶胡升级（番数>90时，得分×1.5）
    if (chosenSkills.includes('s15') && totalFan > 90) {
        currentMultiplier *= 1.5;
    }
    // 技能16：断幺能手（手牌无1、9和字牌时，得分×2.5）
    if (chosenSkills.includes('s16')) {
        const validHand = hand.filter(t => t !== null);
        const hasNoYaoJiu = validHand.every(t => {
            if (t.type === '风' || t.type === '箭') return false;
            if (t.value === 1 || t.value === 9) return false;
            return true;
        });
        if (hasNoYaoJiu) {
            currentMultiplier *= 2.5;
        }
    }
    // 技能17：ALL IN（仅限选技能这一轮，得分×2）
    if (chosenSkills.includes('s17') && isAllInActive) {
        currentMultiplier *= 3;
        isAllInActive = false; // 用完立即失效
    }

    currentMultiplier = Math.round(currentMultiplier * 100) / 100;
    totalScore += Math.floor(totalFan * totalFan * currentMultiplier);
    document.getElementById('score').innerText = totalScore;
    
    if (currentMultiplier > 0 && currentMultiplier !== 1.0) {
        showMultiplierAnimation(currentMultiplier);
    }
    const playedCards = selectedIndices.map(i => hand[i]);
    deck.push(...playedCards);
    
    selectedIndices.forEach(i => {
        hand[i] = null;
    });
    
    if (bestRule && bestRule.hasAnimation) {
        showAnimation(bestRule, selectedTiles);
    } else {
        nextRound();
    }
}
// 显示倍率动画
function showMultiplierAnimation(multiplier) {
    // 创建动画元素
    const animEl = document.createElement('div');
    animEl.innerText = `×${multiplier}`;
    animEl.style.cssText = `
        position: fixed;
        top: 30%;
        left: 50%;
        transform: translateX(-50%);
        color: #FFD700;
        font-size: 28px;
        font-weight: bold;
        text-shadow: 0 0 10px #FF4500, 0 0 20px #FF4500;
        z-index: 1500;
        pointer-events: none;
        animation: multiplierFloat 1.5s ease-out forwards;
        font-family: 'Microsoft YaHei', sans-serif;
    `;
    
    // 添加到页面
    document.body.appendChild(animEl);
    
    // 动画结束后移除元素
    setTimeout(() => {
        if (animEl.parentNode) {
            animEl.remove();
        }
    }, 1500);
}

// 显示动画
function showAnimation(rule, selectedTiles) {
    const overlay = document.getElementById('animationOverlay');
    const tilesContainer = document.getElementById('animationTiles');
    const textElement = document.getElementById('animationText');
    
    overlay.style.background = rule.bgColor || '#000';
    
    let tilesHtml = '';
    
    selectedTiles.forEach(tile => {
        for (let i = 0; i < 3; i++) {
            tilesHtml += `<div class="animation-tile"><img src="${tile.img}" alt="${tile.name}"></div>`;
        }
    });
    
    for (let i = 0; i < 2; i++) {
        tilesHtml += `<div class="animation-tile joker"><img src="images/mahjong/lai.png" alt="赖"></div>`;
    }

    
    tilesContainer.innerHTML = tilesHtml;
    
    textElement.innerText = rule.name;
    textElement.style.color = rule.textColor;
    textElement.style.textShadow = `0 0 15px ${rule.glowColor}`;
    
    overlay.style.display = 'flex';
    
    setTimeout(() => {
        overlay.style.display = 'none';
        nextRound();
    }, 2000);
}

// 下一轮
function nextRound() {
    round++;
    
    // ✅ 第 2、5、8 轮停住，选技能
    const skillRounds = [2, 5, 8];
    if (chosenSkills.includes('s13')) {
        skillRounds.push(11);
    }
    
    if (skillRounds.includes(round)) {
        showSkillModal();
        return; // 这里停下，不再往下走
    }
    
    if (round > 10 && !chosenSkills.includes('s13')) {
        showResult();
        return;
    }
    
    if (round > 11 && chosenSkills.includes('s13')) {
        showResult();
        return;
    }
    // 原来的逻辑（非技能轮）
    const quanOrder = ['东','南','西','北'];
    const idx = quanOrder.indexOf(quanFeng);
    quanFeng = quanOrder[(idx + 1) % 4];
    document.getElementById('round').innerText = round;
    document.getElementById('quanFeng').innerText = quanFeng;
    deck.sort(() => Math.random() - 0.5);
    dealNextRound();
}
// 显示技能弹窗
// 显示技能弹窗
function showSkillModal() {
    const modal = document.getElementById('skillModal');
    const optionsDiv = document.getElementById('skillOptions');
    const roundSpan = document.getElementById('skillRoundNum');
    
    roundSpan.innerText = round;
    optionsDiv.innerHTML = '';

    // ✅ 过滤掉已经选过的技能
    const availableSkills = SKILLS.filter(skill => !chosenSkills.includes(skill.id));

    // 如果可选技能不足3个，就全部显示（一般不会发生）
    const shuffled = [...availableSkills].sort(() => 0.5 - Math.random());
    const threeSkills = shuffled.slice(0, Math.min(3, shuffled.length));

    threeSkills.forEach(skill => {
        const btn = document.createElement('button');
        btn.style.cssText = `
            padding: 12px;
            background: ${skill.bgColor}; /* ✅ 使用技能自定义颜色 */
            border: none;
            border-radius: 5px;
            color: white; /* ✅ 深色背景配白色字更显眼 */
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            transition: transform 0.2s;
        `;
        btn.innerHTML = `<div>${skill.name}</div><div style="font-size:10px; font-weight:normal; opacity:0.9;">${skill.desc}</div>`;
        
        btn.onmouseover = () => btn.style.transform = 'scale(1.02)';
        btn.onmouseout = () => btn.style.transform = 'scale(1)';
        btn.onclick = () => chooseSkill(skill.id);
        optionsDiv.appendChild(btn);
    });

    modal.style.display = 'flex';
}


// 选择技能后的逻辑
// 选择技能后的逻辑
function chooseSkill(skillId) {
    // ✅ 记录已选技能
    chosenSkills.push(skillId);
    if (skillId === 's17') {
        isAllInActive = true;
    }
    const listEl = document.getElementById('chosenSkillsList');
    const names = chosenSkills.map(id => SKILLS.find(s => s.id === id).name.replace('技能', '技'));
    listEl.innerHTML = names.join('<br>');
    // 关闭弹窗
    document.getElementById('skillModal').style.display = 'none';
    
    // 继续游戏
    const quanOrder = ['东','南','西','北'];
    const idx = quanOrder.indexOf(quanFeng);
    quanFeng = quanOrder[(idx + 1) % 4];
    document.getElementById('round').innerText = round;
    document.getElementById('quanFeng').innerText = quanFeng;
    deck.sort(() => Math.random() - 0.5);
    dealNextRound();
}


// 显示成绩图
function showResult() {
    const overlay = document.getElementById('resultOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const bestRoundsListEl = document.getElementById('bestRoundsList');
    
    finalScoreEl.innerText = `${totalScore} 分`;
    
    const sortedRounds = [...roundHistory].sort((a, b) => b.fan - a.fan);
    const top3 = sortedRounds.slice(0, 3);
    
    bestRoundsListEl.innerHTML = top3.map((roundData, index) => {
        let tilesHtml = '';
        roundData.tiles.forEach(tileName => {
            const tile = TILES.find(t => t.name === tileName);
            for (let i = 0; i < 3; i++) {
                tilesHtml += `<div class="best-round-tile"><img src="${tile.img}" alt="${tileName}"></div>`;
            }
        });
        for (let i = 0; i < 2; i++) {
            tilesHtml += `<div class="best-round-tile joker"><img src="images/mahjong/lai.png" alt="赖"></div>`;
        }

        
        return `
            <div class="best-round-item">
                <div class="best-round-tiles">${tilesHtml}</div>
                <div class="best-round-fan">${roundData.fan}番 (${roundData.ruleName})</div>
            </div>
        `;
    }).join('');
    
    if (top3.length === 0) {
        bestRoundsListEl.innerHTML = '<p style="color: #aaa;">暂无出牌记录</p>';
    }
    
    overlay.style.display = 'flex';
}

// 重开游戏
function restartGame() {
    const overlay = document.getElementById('resultOverlay');
    overlay.style.display = 'none';
    
    round = 1;
    totalScore = 0;
    roundHistory = [];
    
    init();
}

// 更新显示
function updateDisplay() {
    document.getElementById('round').innerText = round;
    document.getElementById('score').innerText = totalScore;
    document.getElementById('menFeng').innerText = menFeng;
    document.getElementById('quanFeng').innerText = quanFeng;
}

init();
