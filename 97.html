<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>对对胡MANIA</title>
<style>
:root {
    --tile-w: 40px;  /* 调整为适合图片的宽度 */
    --tile-h: 60px;  /* 调整为适合图片的高度 */
    --gap: 2px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: "Microsoft YaHei", sans-serif; 
    background: #0a2e18; 
    color: #f0e6d3; 
    display: flex; 
    justify-content: center; 
    padding-top: 5px;
    min-height: 100vh;
    font-size: 11px;
}
.container { display: flex; gap: 8px; }

/* 左侧区域 */
.left-panel { width: 280px; }  /* 稍微加宽以适应图片 */
.info-bar { 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 4px;
    font-size: 10px;
}


.hand-area {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
    background: #053014;
    padding: 5px;
    border-radius: 3px;
    margin-bottom: 5px;
}
.slot { 
    height: calc(var(--tile-h) * 1.1); 
    background: rgba(0,0,0,0.2); 
    border-radius: 2px; 
    cursor: pointer; 
    transition: all 0.2s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}
.slot.selected { box-shadow: 0 0 5px gold; transform: translateY(-2px); }
.slot.empty { background: rgba(0,0,0,0.4); cursor: default; }
.slot .tile-wrapper { display: flex; }
.slot .tile { 
    width: var(--tile-w); 
    height: var(--tile-h); 
    border: 1px solid #333; 
    border-radius: 2px; 
    background: #fff; 
    color: #000; 
    font-size: 13px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    margin-left: -8px; /* 图片重叠效果 */
    overflow: hidden; /* 确保图片不溢出 */
}
.slot .tile:first-child { margin-left: 0; }
.slot .tile img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 图片适应容器 */
}

.controls { display: flex; gap: 3px; }
.controls button { 
    flex: 1;
    padding: 4px 2px; 
    font-size: 10px; 
    border: none; 
    border-radius: 2px; 
    cursor: pointer; 
    background: #b8860b; 
    color: #000; 
    font-weight: bold;
}
.controls button:disabled { background: #333; color: #666; cursor: not-allowed; }

/* 右侧区域 */
.right-panel { 
    width: 150px; 
    background: #053014; 
    padding: 5px; 
    border-radius: 3px; 
    font-size: 10px; 
}
.fan-list { margin-top: 5px; max-height: 180px; overflow-y: auto; }
.fan-item { 
    display: flex; 
    justify-content: space-between; 
    padding: 2px 0; 
    border-bottom: 1px dashed #0a5c1a;
}
.fan-item.highlight { color: gold; font-weight: bold; }
.score-display { 
    margin-top: 6px; 
    font-size: 12px; 
    text-align: center; 
    padding: 3px;
    background: rgba(0,0,0,0.2);
    border-radius: 2px;
}

/* 动画界面 */
.animation-overlay {
    position: fixed;
    top: -10%;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.animation-content {
    text-align: center;
}
.animation-tiles {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 600px;
    margin-bottom: 15px;
}
.animation-tile {
    width: 50px; /* 动画里的牌可以稍微大一点 */
    height: 75px;
    border: 2px solid #fff;
    border-radius: 3px;
    background: #fff;
    color: #000;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 2px;
    overflow: hidden;
}
.animation-tile img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
.animation-tile.joker {
    border-color: gold;
    background: linear-gradient(45deg, #fff, #ffe);
}
.animation-text {
    font-size: 40px;
    font-weight: bold;
    text-shadow: 0 0 15px currentColor;
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
@keyframes multiplierFloat {
    0% {
        opacity: 0;
        transform: translateX(-50%) translateY(0) scale(0.8);
    }
    20% {
        opacity: 1;
        transform: translateX(-50%) translateY(-10px) scale(1.2);
    }
    80% {
        opacity: 1;
        transform: translateX(-50%) translateY(-30px) scale(1);
    }
    100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-50px) scale(0.8);
    }
}

/* 成绩图界面 */
.result-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);

.result-content {

.best-rounds {

    margin-bottom: 30px;

.best-round-item {

    background: rgba(0,0,0,0.3);

.best-round-tiles {

.best-round-tile {

    font-size: 14px;

.best-round-tile img {

.best-round-tile.joker {

    background: linear-gradient(45deg, #fff, #ffe);
}
.best-round-fan {
    font-size: 18px;
    color: gold;
    font-weight: bold;

.restart-btn {
    padding: 12px 30px;
    font-size: 18px;
    background: #c9a24d;
    color: #000;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}
.restart-btn:hover {
    background: #d4b366;
}
</style>
</head>

<script>
// ======================================================
// 音频系统 - 6个独立音效函数
// ======================================================
let audioCtx = null;
let audioReady = false;

// 初始化音频（只需要调用一次）
function initAudioOnce() {
    if (audioReady) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
    } catch (e) {
        console.log("音频不支持");
    }
}

// 通用播放函数
function playBeep(freq, duration, waveType = 'sine', vol = 0.3) {
    if (!audioReady) return;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.frequency.value = freq;
    osc.type = waveType;
    
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(vol, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
    
    osc.start(now);
    osc.stop(now + duration);
}
// 1️⃣ 点击音效（按钮、选牌）
function playClickSound() {
    initAudioOnce();
    playBeep(900, 0.04, 'sine', 0.2);
    setTimeout(() => playBeep(700, 0.03, 'sine', 0.15), 20);
}

// 2️⃣ 得分倍率 < 1（负面效果）
function playMultiplierBad() {
    initAudioOnce();
    playBeep(200, 0.3, 'sawtooth', 0.2);
    setTimeout(() => playBeep(150, 0.4, 'sawtooth', 0.15), 150);
}

// 3️⃣ 得分倍率 1-3（普通）
function playMultiplierNormal() {
    initAudioOnce();
    playBeep(400, 0.15, 'sine', 0.3);
    setTimeout(() => playBeep(600, 0.15, 'sine', 0.3), 120);
}

// 4️⃣ 得分倍率 3-10（良好）
function playMultiplierGood() {
    initAudioOnce();
    playBeep(500, 0.1, 'triangle', 0.15);
    setTimeout(() => playBeep(800, 0.15, 'triangle', 0.2), 80);
    setTimeout(() => playBeep(1200, 0.2, 'triangle', 0.15), 160);
}

// 5️⃣ 得分倍率 10-100（优秀）
function playMultiplierGreat() {
    initAudioOnce();
    playBeep(600, 0.1, 'square', 0.2);
    setTimeout(() => playBeep(900, 0.15, 'square', 0.25), 50);
    setTimeout(() => playBeep(1200, 0.2, 'square', 0.2), 120);
    playWhiteNoise(0.3, 0.08);
}

// 6️⃣ 得分倍率 100+（史诗）
function playMultiplierEpic() {
    initAudioOnce();
    const notes = [400, 500, 600, 800, 1000, 1200, 1500];
    notes.forEach((freq, i) => {
        setTimeout(() => {
            playBeep(freq, 0.3, 'sawtooth', 0.3);
        }, i * 80);
    });
    playWhiteNoise(1.0, 0.12);
}
// 🌬️ 番型动画音效：一股风声（所有番型通用）
// 🌬️ 最舒服的风声（先小后大再小）
function playFanWindSound() {
    initAudioOnce();

    const duration = 1.2;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        const t = i / audioCtx.sampleRate;
        output[i] =
            (Math.random() * 2 - 1) * 0.6 +
            Math.sin(t * 25) * 0.4;
    }

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 700;

    const gain = audioCtx.createGain();
    const now = audioCtx.currentTime;
    
    // 温柔的包络
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.linearRampToValueAtTime(0.6, now + 0.35);
    gain.gain.linearRampToValueAtTime(0.1, now + 0.8);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    source.start();
}


// 播放白噪音
function playWhiteNoise(duration, vol = 0.1) {
    if (!audioReady) return;
    
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = buffer.getChannelData(0);
    
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }
    
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    
    const gain = audioCtx.createGain();
    gain.gain.value = vol;
    
    source.connect(gain);
    gain.connect(audioCtx.destination);
    
    source.start();
}

// 游戏状态
let deck = [];
let hand = [];
let selectedIndices = [];
let round = 1 ;
let totalScore = 0;
let roundHistory = [];
let thickMultiplier = 1.0;
// 新增：门风和圈风
let menFeng = '东';
let quanFeng = '东';
let iceCreamMultiplier = 1.6;
// 游戏状态变量区域添加
let hasAddedRedTiles = false; // 是否已添加赤宝牌
let pureZhongyuanMultiplier = 1.0; // 纯正中原一点红倍率
let kaifazhemoshi = false ;
let wanJianQiFaMultiplier = 1.0;
// 每10轮要求的分数（索引0=10轮，1=20轮...9=100轮），你自己填数字
const SCORE_REQUIREMENTS = [0,10000, 30000, 60000, 100000, 160000, 250000, 400000, 700000, 1500000, 3000000, 6000000];
// 在游戏状态变量区域添加
let pureMultiplier = 1.0; // 纯净主义倍率

const FAN_RULES = [
    // ===== 原有番型 =====
    {
        name: "混质胡",
        check: (selectedTiles) => {
            const honors = selectedTiles.filter(t => t.type === '风' || t.type === '箭');
            if (honors.length < 1 || honors.length > 3) return false;
            const numbers = selectedTiles.filter(t => t.type !== '风' && t.type !== '箭');
            const values = numbers.map(t => t.value);
            return values.every(v => [2,3,5,7].includes(v));
        },
        fan: 2,
        hasAnimation: false
    },
    {
        name: "混合胡",
        check: (selectedTiles) => {
            const honors = selectedTiles.filter(t => t.type === '风' || t.type === '箭');
            if (honors.length < 1 || honors.length > 3) return false;
            const numbers = selectedTiles.filter(t => t.type !== '风' && t.type !== '箭');
            const values = numbers.map(t => t.value);
            return values.every(v => [4,6,8,9].includes(v));
        },
        fan: 2,
        hasAnimation: false
    },
    {
        name: "哈基米南北绿豆",
        check: (selectedTiles) => {
            // 必须正好4张（防意外）
            if (selectedTiles.length !== 4) return false;

            const south  = selectedTiles.filter(t => t.type === '风' && t.name === '南');
            const north  = selectedTiles.filter(t => t.type === '风' && t.name === '北');
            const yiTiao = selectedTiles.filter(t => t.type === '条' && t.value === 1); // 1条
            const tongs  = selectedTiles.filter(t => t.type === '筒');

            // 各一张，且筒点数属于 1,2,3,4,5,6,7,9（不许8筒）
            if (
                south.length !== 1 ||
                north.length !== 1 ||
                yiTiao.length !== 1 ||
                tongs.length !== 1
            ) return false;

            const v = tongs[0].value;
            if (![2,3,4,5,6,7,9].includes(v)) return false;

            // 兜底：确保没混进其它不该有的牌（南/北/一条/筒 之外不能再有第5类）
            const total = south.concat(north).concat(yiTiao).concat(tongs);
            return total.length === 4;
        },
        fan: 48,
        hasAnimation: true,
        textColor: "#ADFF2F",   // 黄绿(GreenYellow)
        glowColor: "#6B8E23",   // 深黄绿
        bgColor: "#1A2E10"      // 暗底绿
    },
    {
        name: "大四喜",
        check: (selectedTiles) => {
            const winds = selectedTiles.filter(t => t.type === '风');
            return winds.length === 4 && new Set(winds.map(t => t.name)).size === 4;
        },

// 重置牌堆
function resetDeck() {
    deck = [...TILES].sort(() => Math.random() - 0.5);
    weights.fill(100); // 重置所有权重为100
}

function adjustWeights() {
    // 重置为100
    weights.fill(100);
    TILES.forEach((tile, idx) => {
        if (tile.name === '赤五万' || tile.name === '赤五筒' || tile.name === '赤五条') {
            weights[idx] = 0;
        }
    });
    // 根据已选技能增加权重
    chosenSkills.forEach(skillId => {
        
        TILES.forEach((tile, idx) => {
            if (skillId === 's28' && tile.name === '赤五万') weights[idx] = 100;
            if (skillId === 's39' && tile.name === '赤五筒') weights[idx] = 100;
            if (skillId === 's40' && tile.name === '赤五条') weights[idx] = 100;
            if (skillId === 's1' && tile.type === '万') weights[idx] *= 3; // 万子偏爱
            if (skillId === 's2' && tile.type === '筒') weights[idx] *= 3; // 筒子之友
            if (skillId === 's3' && tile.type === '条') weights[idx] *= 3; // 条子专家
            if (skillId === 's4' && (tile.value === 1 || tile.value === 9 || tile.type === '风' || tile.type === '箭')) weights[idx] *= 3; // 幺九守护
            if (skillId === 's5' && (tile.type === '风' || tile.type === '箭')) weights[idx] *= 3; // 字牌收集
            if (skillId === 's6' && (tile.value >= 2 && tile.value <= 8)) weights[idx] *= 4; // 中间力量
            if (skillId === 's22' && tile.name === '发') weights[idx] *= 1000;
                
                
                
                
                
                
            // 最后最后再判断    
            if (skillId === 's24' && tile.type === '风' && tile.name === menFeng && menFeng === quanFeng) 
                weights[idx] = 0;
        
            
        });
    });
}



function weightedDrawFromDeck(count) {
    const drawn = [];
    for (let i = 0; i < count; i++) {
        if (deck.length === 0) break;
        
        // 计算当前deck中每张牌的权重
        const deckWeights = deck.map(tile => {
            const tileIdx = TILES.findIndex(t => t.id === tile.id);
            return weights[tileIdx];
        });
        
        // 加权随机
        const totalWeight = deckWeights.reduce((a, b) => a + b, 0);
        let r = Math.random() * totalWeight;
        let selectedIdx = -1;
        
        for (let j = 0; j < deck.length; j++) {
            r -= deckWeights[j];
            if (r <= 0) {
                selectedIdx = j;
                break;
            }
        }
        
        if (selectedIdx === -1) selectedIdx = deck.length - 1;
        drawn.push(deck[selectedIdx]);
        deck.splice(selectedIdx, 1); // 移除已抽的牌
    }
    return drawn;
}
function dealFirstRound() {
    resetDeck(); // 重置牌堆和权重
    adjustWeights(); // 调整权重（第一轮技能为空，权重都是100）
    
    if (deck.length < 8) {
        resetDeck();
        adjustWeights();
    }
    
    const newCards = weightedDrawFromDeck(8); // 使用加权抽取
    hand = newCards.map(card => card);
    
    selectedIndices = [];
    
    renderHand();
    updateButtons();
    clearPreview();
}
function dealNextRound() {
    const emptySlots = hand.filter(card => card === null).length;
    if (round === 101) {
        showResult();
        return;
    }
    // 如果牌不够，重置牌堆
    if (deck.length < emptySlots) {
        resetDeck();
        adjustWeights();
        
        // 移除手上保留的4张牌
        const keptTiles = hand.filter(tile => tile !== null);
        deck = deck.filter(tile => 
            !keptTiles.some(kept => kept.id === tile.id)
        );
    }
    
    adjustWeights(); // 调整权重
    
    // 使用加权抽取
    const newCards = weightedDrawFromDeck(emptySlots);
    
    // 放到手牌里
    let cardIndex = 0;
    for (let i = 0; i < hand.length; i++) {
        if (hand[i] === null) {
            hand[i] = newCards[cardIndex++];
        }
    }
    
    selectedIndices = [];
    renderHand();
    updateButtons();
    clearPreview();
}

    if (selectedIndex !== -1) {

function smartSelect() {
    // 获取非空手牌
    playClickSound(); 
    const validCards = hand
        .map((tile, index) => ({ tile, index }))
        .filter(item => item.tile !== null);
    
    if (validCards.length < 4) return;
    
    let bestCombo = [];
    let bestScore = -1;
    
    // 遍历所有4张牌组合 C(8,4)=70
    for (let i = 0; i < validCards.length; i++) {
        for (let j = i + 1; j < validCards.length; j++) {
            for (let k = j + 1; k < validCards.length; k++) {
                for (let l = k + 1; l < validCards.length; l++) {
                    const combo = [validCards[i], validCards[j], validCards[k], validCards[l]];
                    const indices = combo.map(item => item.index);
                    
                    // 临时设置选中
                    const originalSelected = selectedIndices;
                    selectedIndices = indices;
                    
                    // 计算番数
                    const score = calculateAllFans();
                    
                    // 恢复
                    selectedIndices = originalSelected;
                    
                    // 比较（现在是平方得分）
                    if (score > bestScore) {
                        bestScore = score;
                        bestCombo = indices;
                    }
                }
            }
        }
    }
    
    // 应用最佳组合
    selectedIndices = bestCombo;
    updateSelectionVisual();
    updateButtons();
    calculateAllFans();
}

// 计算所有番型并返回总番数
function calculateAllFans() {
    if (selectedIndices.length !== 4) return 0;
    
    const selectedTiles = selectedIndices.map(i => hand[i]);
    
    let allFans = [];
    let totalFan = 0;
    let maxFan = 0;
    let bestRule = null;
    
    FAN_RULES.forEach(rule => {
        const realHand = hand.filter(t => t !== null);
        const result = rule.check(selectedTiles, realHand);
        if (result) {
            let fanValue = rule.fan;
            //我这辈子不会再见到轮刻，操你妈
            allFans.push({
                name: rule.name,
                fan: fanValue,
                rule: rule
            });
            totalFan += fanValue;
            
            if (fanValue > maxFan) {
                maxFan = fanValue;
                bestRule = rule;
            }
        }
    });
    
    if (allFans.length === 0) {
        const baseRule = FAN_RULES.find(r => r.name === "碰碰胡");
        allFans.push({
            name: baseRule.name,
            fan: baseRule.fan,
            rule: baseRule
        });
        totalFan = baseRule.fan;
        maxFan = baseRule.fan;
        bestRule = baseRule;
    }
    
    window.currentBestRule = bestRule;
    window.currentSelectedTiles = selectedTiles;
    
    renderAllFans(allFans, totalFan);
    return totalFan;
}
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// 打出牌
function playRound() {

    if (selectedIndices.length !== 4) return;
    
    const selectedTiles = selectedIndices.map(i => hand[i]);
    lastRemainingTiles = hand.filter((tile, index) => !selectedIndices.includes(index));
    
    let allFans = [];
    let totalFan = 0;
    let maxFan = 0;
    let bestRule = null;
    
    FAN_RULES.forEach(rule => {
        const realHand = hand.filter(t => t !== null);
        const result = rule.check(selectedTiles, realHand);
    
        if (result) {
            let fanValue = rule.fan;
            allFans.push(fanValue);
            totalFan += fanValue;
            if (fanValue > maxFan) {
                maxFan = fanValue;
                bestRule = rule;
            }
        }
    });
    
    if (totalFan === 0) {
        const baseRule = FAN_RULES.find(r => r.name === "碰碰胡");
        totalFan = baseRule.fan;
        maxFan = baseRule.fan;
        bestRule = baseRule;
    }
    
    roundHistory.push({
        round: round,
        tiles: selectedTiles.map(t => t.name),
        fan: totalFan,
        ruleName: bestRule.name
    });
    // 获取当前技能倍率
    let currentMultiplier = 1.0;
    if (chosenSkills.includes('s7') && totalFan > 50) {
        currentMultiplier *= 1.3;    
    }
    // 技能8：得分倍增
    if (chosenSkills.includes('s8')) {
        currentMultiplier *= 1.2;
    }
    // 技能9：幸运暴击
    if (chosenSkills.includes('s9')) {
        currentMultiplier *= Math.random() < 0.5 ? 1.1 : 1.3;
    }
    // 技能10：终极暴击
    if (chosenSkills.includes('s10')) {
        currentMultiplier *= Math.random() < 0.5 ? 0.8 : 1.6;
    }
    // 技能11：天堂and地狱
    if (chosenSkills.includes('s11')) {
        currentMultiplier *= Math.random() < 0.5 ? 0.4 : 2.0;
    }
    // 技能14：顶胡升级（番数>75时，得分×1.4）
    if (chosenSkills.includes('s14') && totalFan > 75) {
        currentMultiplier *= 1.4;
    }
    // 技能15：超顶胡升级（番数>90时，得分×1.5）
    if (chosenSkills.includes('s15') && totalFan > 90) {
        currentMultiplier *= 1.5;
    }
    // 技能16：断幺能手（手牌无1、9和字牌时，得分×2.5）
    if (chosenSkills.includes('s16')) {
        const validHand = hand.filter(t => t !== null);
        const hasNoYaoJiu = validHand.every(t => {
            if (t.type === '风' || t.type === '箭') return false;
            if (t.value === 1 || t.value === 9) return false;
            return true;
        });
        if (hasNoYaoJiu) {
            currentMultiplier *= 2.5;
        }
    }
    // 技能17：ALL IN（仅限选技能这一轮，得分×2）
    if (chosenSkills.includes('s17') && isAllInActive) {
        currentMultiplier *= 3;
        isAllInActive = false; // 用完立即失效
    }
    if (chosenSkills.includes('s20')) {
        currentMultiplier *= thickMultiplier;
        if (totalFan < 2) {
            thickMultiplier += 0.1;
        }
    }
    if (chosenSkills.includes('s21')) {
        currentMultiplier *= iceCreamMultiplier;
        iceCreamMultiplier = Math.max(iceCreamMultiplier - 0.02, 1); 
    }
        // 技能23：门冲煞
    if (chosenSkills.includes('s23')) {
        if (menFeng === quanFeng) {
            currentMultiplier *= 1.8;
        } else {
            currentMultiplier *= 0.8;
        }
    }
    // 技能24：直冲云霄
    if (chosenSkills.includes('s24') && totalFan > 120) {
        currentMultiplier *= 1.6;
    }

    // 技能25：直达天际
    if (chosenSkills.includes('s25') && totalFan > 180) {
        currentMultiplier *= 1.7;
    }
// 在 playRound 函数中，计算番型前添加
    if (chosenSkills.includes('s27')) {
        const selectedTiles = selectedIndices.map(i => hand[i]);
        const hasNoHonor = selectedTiles.every(t => t.type !== '风' && t.type !== '箭' && t.value > 1 && t.value < 9);
        
        if (hasNoHonor) {
            pureMultiplier += 0.05;
        }
        // 在应用倍数的地方添加
        currentMultiplier *= pureMultiplier;

    }
    if (chosenSkills.includes('s30')) {
    // 检查是否打出了纯正中原一点红
        const hasPureZhongyuan = FAN_RULES.find(rule => 
            rule.name === "纯正中原一点红" && rule.check(selectedTiles, hand.filter(t => t !== null))
        );
    
        if (hasPureZhongyuan) {
            pureZhongyuanMultiplier += 0.2; // 每次打出提升0.2倍
        }
        currentMultiplier *= pureZhongyuanMultiplier;
    }
    // 在 playRound 函数里，计算 currentMultiplier 的地方插入
    if (chosenSkills.includes('s31')) {
        const selectedTiles = selectedIndices.map(i => hand[i]);
        // 检查是否全是 4、5、6 的数字牌
        const isAll456 = selectedTiles.every(t => 
            (t.type === '万' || t.type === '筒' || t.type === '条') &&
            (t.value === 4 || t.value === 5 || t.value === 6)
        );
        if (isAll456) {
            currentMultiplier *= 1.6;
        }
    }
    if (chosenSkills.includes('s34')) {
    // 检查是否打出了万箭齐发番型
        const hasWanJianQiFa = FAN_RULES.find(rule => 
            rule.name === "万箭齐发" && rule.check(selectedTiles, hand.filter(t => t !== null))
        );
        if (hasWanJianQiFa) {
            wanJianQiFaMultiplier += 0.2;
        }
        currentMultiplier *= wanJianQiFaMultiplier;
    }
    if (kaifazhemoshi) currentMultiplier *= Math.random()*66666;
    
    currentMultiplier = Math.round(currentMultiplier * 100) / 100;
    if (currentMultiplier === 1.0) playClickSound(); 
    
    
    totalScore += Math.floor(totalFan * totalFan * currentMultiplier);
    document.getElementById('score').innerText = totalScore;
    
    if (currentMultiplier > 0 && currentMultiplier !== 1.0) {
        showMultiplierAnimation(currentMultiplier);
    }
    const playedCards = selectedIndices.map(i => hand[i]);
    deck.push(...playedCards);
    
    selectedIndices.forEach(i => {
        hand[i] = null;
    });
    
    if (bestRule && bestRule.hasAnimation) {
        showAnimation(bestRule, selectedTiles);
        
    } else {
        nextRound();
    }
}

// 下一轮
function nextRound() {
    round++;
    if (round > 100) {
        showResult();
        return;
    }
    // 每10轮检查分数要求
    if (round % 10 === 0) {
        
        // 换门风（东南西北循环）
        const fengs = ['东','南','西','北'];
        const idx = fengs.indexOf(menFeng);
        menFeng = fengs[(idx + 1) % 4];
        document.getElementById('menFeng').innerText = menFeng;
    }
    if (round % 10 === 1) {
        const requiredScore = SCORE_REQUIREMENTS[(round-1) / 10];
        updateDisplay();
        if (totalScore < requiredScore) {
            showResult();
            alert(`第${round}轮未达要求（需${requiredScore}分，当前${totalScore}分），游戏结束！`)
            return;
        }
    }
    // ✅ 第 2、5、8 轮停住，选技能
    const skillRounds = [8, 12, 18, 22, 28, 32, 38, 42, 48, 52, 58, 62, 68, 72, 78, 82, 88, 92, 98];
    
    if (skillRounds.includes(round)) {
        showSkillModal();
        return; // 这里停下，不再往下走
    }

    // 原来的逻辑（非技能轮）
    const quanOrder = ['东','南','西','北'];
    const idx = quanOrder.indexOf(quanFeng);
    quanFeng = quanOrder[(idx + 1) % 4];
    document.getElementById('round').innerText = round;
    document.getElementById('quanFeng').innerText = quanFeng;
    deck.sort(() => Math.random() - 0.5);
    dealNextRound();
}

            border: none;
            border-radius: 5px;
            color: white; /* ✅ 深色背景配白色字更显眼 */
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            transition: transform 0.2s;
        `;
        btn.innerHTML = `<div>${skill.name}</div><div style="font-size:10px; font-weight:normal; opacity:0.9;">${skill.desc}</div>`;
        
        btn.onmouseover = () => btn.style.transform = 'scale(1.02)';
        btn.onmouseout = () => btn.style.transform = 'scale(1)';
        btn.onclick = () => chooseSkill(skill.id);
        optionsDiv.appendChild(btn);
    });

    modal.style.display = 'flex';
}


// 选择技能后的逻辑
// 选择技能后的逻辑
function chooseSkill(skillId) {
    // ✅ 记录已选技能
    chosenSkills.push(skillId);
    
    if (skillId === 's17') {
        isAllInActive = true;
    }
    
    const listEl = document.getElementById('chosenSkillsList');
    const names = chosenSkills.map(id => SKILLS.find(s => s.id === id).name.replace('技能', '技'));
    listEl.innerHTML = names.join('<br>');
    // 关闭弹窗
    document.getElementById('skillModal').style.display = 'none';
    
    // 继续游戏
    const quanOrder = ['东','南','西','北'];
    const idx = quanOrder.indexOf(quanFeng);
    quanFeng = quanOrder[(idx + 1) % 4];
    document.getElementById('round').innerText = round;
    document.getElementById('quanFeng').innerText = quanFeng;
    deck.sort(() => Math.random() - 0.5);
    dealNextRound();
}


// 显示成绩图
function showResult() {
    const overlay = document.getElementById('resultOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const bestRoundsListEl = document.getElementById('bestRoundsList');
    
    finalScoreEl.innerText = `${totalScore} 分`;
    
    const sortedRounds = [...roundHistory].sort((a, b) => b.fan - a.fan);
    const top3 = sortedRounds.slice(0, 3);
    
    bestRoundsListEl.innerHTML = top3.map((roundData) => {
        let tilesHtml = '';
        roundData.tiles.forEach(tileName => {
            // ✅ 关键修复：同时查基础牌库和条件牌库
            let tile = TILES.find(t => t.name === tileName);
            if (!tile) {
                // 查当前牌堆（含已加入的赤宝牌）
                tile = deck.find(t => t.name === tileName);
            }
            if (!tile) {
                // 兜底：防止未知牌名报错
                tile = { img: 'images/mahjong/back.png', name: tileName };
            }
            
            for (let i = 0; i < 3; i++) {
                tilesHtml += `<div class="best-round-tile"><img src="${tile.img}" alt="${tile.name}"></div>`;
            }
        });
        
        for (let i = 0; i < 2; i++) {
            tilesHtml += `<div class="best-round-tile joker"><img src="images/mahjong/lai.png" alt="赖"></div>`;
        }

        return `
            <div class="best-round-item">
                <div class="best-round-tiles">${tilesHtml}</div>
                <div class="best-round-fan">${roundData.fan}番 (${roundData.ruleName})</div>
            </div>
        `;
    }).join('');
    
    if (top3.length === 0) {
        bestRoundsListEl.innerHTML = '<p style="color: #aaa;">暂无出牌记录</p>';
    }
    
    overlay.style.display = 'flex';
}

// 重开游戏
function restartGame() {
    const overlay = document.getElementById('resultOverlay');
    overlay.style.display = 'none';
    
    round = 1;
    totalScore = 0;
    roundHistory = [];
    
    init();
}

// 更新显示
function updateDisplay() {
    document.getElementById('round').innerText = round;
    document.getElementById('score').innerText = totalScore;
    document.getElementById('menFeng').innerText = menFeng;
    document.getElementById('quanFeng').innerText = quanFeng;
    updateNextGoal(); 
}

// 启动游戏
init();
</script>
